<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Opening Tracker</title>
    <style>
        :root {
            --totless-color: #0ea5e9;
            --soul-color: #a855f7;
            --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th { padding: 12px; text-align: center; color: white; border: 1px solid #ffffff33; }
        
        /* Header Colors */
        .header-main { background-color: #334155; }
        .header-totless { background-color: var(--totless-color); }
        .header-soul { background-color: var(--soul-color); }
        
        /* Cell Styles */
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center; border-right: 1px solid #f1f5f9; }
        .name-col { text-align: left; font-weight: bold; width: 20%; padding-left: 15px; background: #fdfdfd; }
        
        /* Tinted Columns to distinguish users */
        .totless-cell { background-color: #f0f9ff; }
        .soul-cell { background-color: #faf5ff; }

        tr:hover td { background-color: #f1f5f9 !important; }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; vertical-align: middle; }
        .totless-cell input { accent-color: var(--totless-color); }
        .soul-cell input { accent-color: var(--soul-color); }

        .sticky-header { position: sticky; top: 0; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <h1>Card Opening Tracker</h1>
    <p class="subtitle">Tracking progress for Totless and Soul</p>

    <table>
        <thead class="sticky-header">
            <tr class="header-main">
                <th rowspan="2" class="name-col" style="color: white;">Name</th>
                <th colspan="3" class="header-totless">TOTLESS</th>
                <th colspan="3" class="header-soul">SOUL</th>
            </tr>
            <tr class="header-main">
                <th class="header-totless">8</th>
                <th class="header-totless">9</th>
                <th class="header-totless">M</th>
                <th class="header-soul">8</th>
                <th class="header-soul">9</th>
                <th class="header-soul">M</th>
            </tr>
        </thead>
        <tbody id="checklist-body">
            </tbody>
    </table>
</div>

<script>
    const names = [
        "Cotton", "Kokonuts", "Jowol", "Saruei", "CyYu", "Obkatie", "Sansin", "Vienna", 
        "Fream", "Egg", "ChaCha", "Silver", "Hannah", "Shylily", "DyaRikku", "Suko", 
        "Laimu", "Squchan", "Vei", "Toma", "Poseidon", "Totless", "Vex", "Buffpup", 
        "Rainhoe", "Trickywi", "Candii", "Elly", "Spite", "Shoto", "Amalee", "Ikumi", 
        "Yenko", "Bao", "Ari", "Lucy", "Yoclesh", "Froggy", "Doki", "Nano", "Yuzu", 
        "Juniper", "Ein", "Camila", "Deme", "Sky", "Aethel", "Fefe", "Milky", "Numi", 
        "Heavenly", "Onikanzei", "Nyanners", 
    ];

    const tableBody = document.getElementById('checklist-body');

    names.forEach((name, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="name-col">${name}</td>
            <td class="totless-cell"><input type="checkbox" id="t8-${index}" onchange="save()"></td>
            <td class="totless-cell"><input type="checkbox" id="t9-${index}" onchange="save()"></td>
            <td class="totless-cell"><input type="checkbox" id="tm-${index}" onchange="save()"></td>
            <td class="soul-cell"><input type="checkbox" id="s8-${index}" onchange="save()"></td>
            <td class="soul-cell"><input type="checkbox" id="s9-${index}" onchange="save()"></td>
            <td class="soul-cell"><input type="checkbox" id="sm-${index}" onchange="save()"></td>
        `;
        tableBody.appendChild(row);
    });

    function save() {
        const checks = document.querySelectorAll('input[type="checkbox"]');
        const data = Array.from(checks).map(c => c.checked);
        localStorage.setItem('cardTrackerData', JSON.stringify(data));
    }

    function load() {
        const data = JSON.parse(localStorage.getItem('cardTrackerData'));
        if (data) {
            const checks = document.querySelectorAll('input[type="checkbox"]');
            checks.forEach((c, i) => c.checked = data[i]);
        }
    }

    window.onload = load;
</script>

</body>
</html>
